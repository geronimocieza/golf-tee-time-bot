# ─────────────────────────────────────────────────────────────
# Golf Tee Time Bot — configuration
# ─────────────────────────────────────────────────────────────
# Edit this file to add/remove clubs or change email settings.
# No coding needed — just edit the values below.

email:
  to: "YOUR_EMAIL@gmail.com"        # where you want the daily digest sent
  from_name: "Golf Tee Time Bot"

filters:
  # Only include tee times on Saturday/Sunday. Set to false to see every day.
  weekend_only: true

# How many upcoming days each club's calendar shows (MiClub sites default to
# showing about 6 days at a time starting today — this is fixed by the club's
# website, not something we control).
#
# platform: "miclub"  -> fully automated scraping (most of your clubs)
# platform: "manual"  -> we can't reliably auto-scrape this one; the email
#                        will just include a direct link to check yourself.

clubs:
